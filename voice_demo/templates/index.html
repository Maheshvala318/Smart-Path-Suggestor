<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Navigation Agent Demo</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: #0a0a0a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background: #111827;
            padding: 40px 30px;
            border-radius: 20px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            border: 1px solid #1f2937;
            text-align: center;
        }
        h2 {
            background: linear-gradient(90deg, #4ade80, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 25px;
            margin-top: 0;
            font-size: 1.8em;
        }
        .btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 16px 30px;
            font-size: 1.1em;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 20px;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }
        .btn:hover { background: #2563eb; transform: translateY(-2px); }
        .btn.listening {
            background: #ef4444;
            animation: pulse-red 1.5s infinite;
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4);
        }

        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        .status {
            font-size: 0.95em;
            color: #9ca3af;
            min-height: 45px;
            margin-bottom: 25px;
            line-height: 1.4;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #9ca3af;
            font-size: 0.9em;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .input-group input {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid #374151;
            background: #1f2937;
            color: #4ade80;
            font-size: 1.1em;
            font-weight: 600;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }
        .input-group input:focus {
            outline: none;
            border-color: #3b82f6;
        }

        .next-btn {
            background: #10b981;
            margin-top: 15px;
            margin-bottom: 0;
            opacity: 0.5;
            cursor: not-allowed;
            box-shadow: none;
        }
        .next-btn.active {
            opacity: 1;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);
        }
        .next-btn.active:hover { background: #059669; }
    </style>
</head>
<body>

    <div class="container">
        <h2>🎤 Voice Route Agent</h2>

        <button id="micBtn" class="btn">
            <span id="micIcon" style="font-size: 1.3em;">🎙️</span>
            <span id="micText">Tap & Speak Route</span>
        </button>

        <div id="status" class="status">Click the microphone and say:<br>"I want to go from [Source] to [Destination]"</div>

        <div class="input-group">
            <label>Source (Starting Point)</label>
            <input type="text" id="sourceInput" placeholder="E.g., Main Door">
        </div>

        <div class="input-group">
            <label>Destination (Ending Point)</label>
            <input type="text" id="destInput" placeholder="E.g., Lab 2">
        </div>

        <button id="nextBtn" class="btn next-btn" onclick="goToNextStep()">Calculate Route ➔</button>
    </div>

    <script>
        const micBtn = document.getElementById('micBtn');
        const micText = document.getElementById('micText');
        const statusEl = document.getElementById('status');
        const sourceInput = document.getElementById('sourceInput');
        const destInput = document.getElementById('destInput');
        const nextBtn = document.getElementById('nextBtn');

        // Web Speech API Initialization
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

        if (!SpeechRecognition) {
            statusEl.innerHTML = "❌ Your browser does not support Speech Recognition.<br>Please try Chrome or Edge.";
            statusEl.style.color = "#ef4444";
        } else {
            const recognition = new SpeechRecognition();
            recognition.lang = 'en-US';
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;

            let isListening = false;

            micBtn.addEventListener('click', () => {
                if (isListening) {
                    recognition.stop();
                } else {
                    recognition.start();
                }
            });

            recognition.onstart = () => {
                isListening = true;
                micBtn.classList.add('listening');
                micText.textContent = "Listening...";
                statusEl.textContent = "Speak your destination clearly now...";
                statusEl.style.color = "#9ca3af";
            };

            recognition.onresult = async (event) => {
                const transcript = event.results[0][0].transcript;
                statusEl.innerHTML = `Recognized: "<span style="color:#fff">${transcript}</span>"`;

                micBtn.classList.remove('listening');
                micText.textContent = "AI Processing...";

                // Send the captured text to our Python Flask backend for LLM parsing
                await extractFields(transcript);
            };

            recognition.onerror = (event) => {
                statusEl.textContent = `Microphone Error: ${event.error}`;
                statusEl.style.color = "#ef4444";
                resetMicBtn();
            };

            recognition.onend = () => {
                if(isListening) resetMicBtn();
            };

            function resetMicBtn() {
                isListening = false;
                micBtn.classList.remove('listening');
                micText.textContent = "Tap & Speak Route";
            }
        }

        // Send text to backend and populate fields
        async function extractFields(text) {
            try {
                const response = await fetch('/parse', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text })
                });

                const data = await response.json();

                if (data.error && data.error.includes("API_KEY")) {
                    // API key missing in .env - use primitive local fallback
                    statusEl.innerHTML = `⚠️ API Key not set.<br>Falling back to basic word matching.`;
                    statusEl.style.color = "#f59e0b";
                    fallbackExtraction(text);
                } else if (data.error) {
                    statusEl.textContent = `Extraction Error: ${data.error}`;
                    statusEl.style.color = "#ef4444";
                } else {
                    // Successfully extracted fields via LLM
                    sourceInput.value = data.source || "";
                    destInput.value = data.destination || "";
                    statusEl.textContent = "✅ Route fields extracted successfully!";
                    statusEl.style.color = "#4ade80";

                    // Simple animation for the inputs to show they updated
                    sourceInput.style.transform = "scale(1.05)";
                    destInput.style.transform = "scale(1.05)";
                    setTimeout(() => {
                        sourceInput.style.transform = "scale(1)";
                        destInput.style.transform = "scale(1)";
                    }, 200);

                    checkNextBtn();
                }
            } catch (err) {
                statusEl.textContent = "⚠️ Server unreachable. Falling back to local matching.";
                statusEl.style.color = "#f59e0b";
                fallbackExtraction(text);
                console.error(err);
            }
            const micBtnElement = document.getElementById('micBtn');
            micBtnElement.classList.remove('listening');
            micText.textContent = "Tap & Speak Route";
        }

        // A simple backup NLP parser if Flask server is offline or no API key
        function fallbackExtraction(text) {
            const lower = text.toLowerCase();
            const words = lower.split(' ');
            let src = "";
            let dest = "";

            // Very naive "from X to Y" parsing
            if (words.includes('from') && words.includes('to')) {
                const fromIdx = words.indexOf('from');
                const toIdx = words.lastIndexOf('to');
                if (fromIdx < toIdx) {
                    src = text.split(' ').slice(fromIdx + 1, toIdx).join(' ').trim();
                    dest = text.split(' ').slice(toIdx + 1).join(' ').trim();
                } else {
                    dest = text.split(' ').slice(toIdx + 1, fromIdx).join(' ').trim();
                    src = text.split(' ').slice(fromIdx + 1).join(' ').trim();
                }
            } else if (words.includes('to')) {
                const toIdx = words.lastIndexOf('to');
                dest = text.split(' ').slice(toIdx + 1).join(' ').trim();
                src = "Current Location"; // Assume current location if 'from' is omitted
            }

            // Capitalize first letters as a best guess
            sourceInput.value = src.replace(/\b\w/g, l => l.toUpperCase());
            destInput.value = dest.replace(/\b\w/g, l => l.toUpperCase());
            checkNextBtn();
        }

        // State management for the 'next' button
        function checkNextBtn() {
            if (sourceInput.value.trim() && destInput.value.trim()) {
                nextBtn.classList.add('active');
            } else {
                nextBtn.classList.remove('active');
            }
        }

        sourceInput.addEventListener('input', checkNextBtn);
        destInput.addEventListener('input', checkNextBtn);

        function goToNextStep() {
            if (!nextBtn.classList.contains('active')) return;
            const src = encodeURIComponent(sourceInput.value.trim());
            const dst = encodeURIComponent(destInput.value.trim());
            const url = `http://localhost:5050/?source=${src}&destination=${dst}`;
            window.open(url, '_blank');
        }
    </script>
</body>
</html>
